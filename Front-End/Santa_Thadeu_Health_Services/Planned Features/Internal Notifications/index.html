<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        /* Toast Animation */
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .toast-notification {
            animation: slideIn 0.3s ease-out forwards;
        }

        /* Custom Scrollbar for Notification Dropdown */
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
    </style>
</head>
<body class="p-0">

    <!-- Top Navigation Bar -->
    <nav class="bg-white border-b border-slate-200 px-8 py-3 flex justify-end items-center gap-8 sticky top-0 z-40">
        <div class="flex items-center gap-2 text-slate-600 cursor-pointer hover:text-slate-900 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            <span class="text-sm font-medium">Queensdale</span>
        </div>
        <div class="flex items-center gap-2 text-slate-600 cursor-pointer hover:text-slate-900 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
            </svg>
            <span class="text-sm font-medium">Medical</span>
        </div>
        
        <!-- Notifications Button & Dropdown -->
        <div class="relative">
            <button id="notif-btn" class="flex items-center gap-2 text-slate-600 hover:text-slate-900 transition relative p-2 rounded-full hover:bg-slate-100">
                <span class="text-sm font-medium mr-1">Allan</span>
                <div class="relative">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                    <span id="unread-count" class="absolute -top-1 -right-1 bg-red-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white">0</span>
                </div>
            </button>

            <!-- Notification Dropdown Dialog -->
            <div id="notif-dropdown" class="hidden absolute right-0 mt-3 w-80 bg-white border border-slate-200 shadow-xl rounded-xl overflow-hidden z-50">
                <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                    <h3 class="font-bold text-slate-800">Notifications</h3>
                    <button onclick="markAllAsRead()" class="text-xs text-blue-600 hover:underline">Mark all as read</button>
                </div>
                <div id="notif-list" class="max-h-[400px] overflow-y-auto custom-scroll">
                    <!-- Notifications will be injected here -->
                </div>
                <div class="p-3 border-t border-slate-100 bg-slate-50 text-center">
                    <button class="text-sm font-semibold text-slate-600 hover:text-slate-900">View Booking List</button>
                </div>
            </div>
        </div>

        <div class="h-8 w-8 bg-slate-800 rounded-full flex items-center justify-center text-white text-xs font-bold">A</div>
    </nav>

    <!-- Notification Toast Container -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-4 pointer-events-none"></div>

    <div class="p-8 max-w-6xl mx-auto">
        <div class="mb-8">
            <h1 class="text-4xl font-bold text-slate-900 mb-2">Debtors List:</h1>
            <div class="max-w-xs relative mt-4">
                <input type="text" placeholder="cimas" class="w-full pl-4 pr-10 py-2 border border-slate-300 rounded-md shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Example Card 1 -->
            <div class="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-slate-50 p-3 text-center border-b border-slate-200 font-bold text-slate-700">CIMAS</div>
                <table class="w-full text-sm text-center">
                    <thead class="bg-slate-100 text-slate-600 text-[10px] uppercase">
                        <tr><th class="py-2 px-3">Debt Age</th><th class="py-2">Amount (USD)</th><th class="py-2">Amount (ZWG)</th></tr>
                    </thead>
                    <tbody>
                        <tr class="bg-slate-200 font-bold">
                            <td class="py-3 px-3">Legacy Debt</td><td>2,924.00</td><td>0.00</td>
                        </tr>
                        <tr class="bg-red-600 text-white font-bold">
                            <td class="py-3 px-3">120+</td><td>0.00</td><td>701.00</td>
                        </tr>
                        <tr class="bg-orange-500 text-white font-bold">
                            <td class="py-3 px-3">90 Days</td><td>0.00</td><td>1,150.01</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <!-- More cards could go here... -->
        </div>
    </div>

    <script>
        // State Management
        let notifications = [
            { id: 1, name: 'Sarah Jenkins', time: '9:00 AM', read: false, type: 'Booking' },
            { id: 2, name: 'Mike Rossman', time: '1:30 PM', read: false, type: 'Consultation' },
            { id: 3, name: 'Emergency: Dept 4', time: 'NOW', read: false, type: 'Alert' }
        ];

        // Toggle Dropdown
        const notifBtn = document.getElementById('notif-btn');
        const notifDropdown = document.getElementById('notif-dropdown');
        
        notifBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            notifDropdown.classList.toggle('hidden');
        });

        document.addEventListener('click', () => notifDropdown.classList.add('hidden'));
        notifDropdown.addEventListener('click', (e) => e.stopPropagation());

        // Update Notification UI
        function renderNotifications() {
            const list = document.getElementById('notif-list');
            const unreadCount = notifications.filter(n => !n.read).length;
            document.getElementById('unread-count').innerText = unreadCount;
            document.getElementById('unread-count').style.display = unreadCount > 0 ? 'block' : 'none';

            if (notifications.length === 0) {
                list.innerHTML = `<div class="p-8 text-center text-slate-400 text-sm italic">No notifications</div>`;
                return;
            }

            list.innerHTML = notifications.map(n => `
                <div class="p-4 border-b border-slate-50 hover:bg-slate-50 transition cursor-pointer ${!n.read ? 'bg-blue-50/30' : ''}" onclick="markAsRead(${n.id})">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-xs font-bold text-blue-600 uppercase tracking-tight">${n.type}</span>
                        <span class="text-[10px] text-slate-400">${n.time}</span>
                    </div>
                    <h4 class="text-sm font-bold text-slate-800">${n.name}</h4>
                    <div class="mt-3 flex gap-2">
                        <button onclick="dismissNotif(${n.id}, event)" class="text-[10px] bg-white border border-slate-200 px-2 py-1 rounded hover:bg-slate-100">Dismiss</button>
                        <button onclick="snoozeNotif(${n.id}, event)" class="text-[10px] bg-slate-800 text-white px-2 py-1 rounded hover:bg-slate-700">Snooze (5m)</button>
                    </div>
                </div>
            `).join('');
        }

        function markAsRead(id) {
            notifications = notifications.map(n => n.id === id ? {...n, read: true} : n);
            renderNotifications();
        }

        function markAllAsRead() {
            notifications = notifications.map(n => ({...n, read: true}));
            renderNotifications();
        }

        function dismissNotif(id, event) {
            event.stopPropagation();
            notifications = notifications.filter(n => n.id !== id);
            renderNotifications();
        }

        function snoozeNotif(id, event) {
            event.stopPropagation();
            const notif = notifications.find(n => n.id === id);
            notifications = notifications.filter(n => n.id !== id);
            renderNotifications();
            
            // For testing: Re-trigger after 7 seconds instead of 5 minutes
            setTimeout(() => {
                const reNotif = {...notif, id: Date.now(), read: false, time: 'RE-ALERT'};
                notifications.unshift(reNotif);
                renderNotifications();
                showPopUp(reNotif);
            }, 7000); 
        }

        // Pop up toast (The "Phone style" alert)
        function showPopUp(booking) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast-notification pointer-events-auto bg-white border-l-4 border-blue-600 shadow-2xl rounded-lg p-4 w-80 flex items-start gap-4';
            
            toast.innerHTML = `
                <div class="bg-blue-100 p-2 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-600" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd" />
                    </svg>
                </div>
                <div class="flex-1">
                    <h4 class="font-bold text-slate-800 text-sm italic">Reminder</h4>
                    <p class="text-slate-600 text-xs">${booking.name}</p>
                    <div class="mt-2 flex gap-2">
                        <button onclick="this.closest('.toast-notification').remove()" class="text-[10px] font-bold text-blue-600 uppercase hover:underline">Dismiss</button>
                        <button onclick="snoozeNotif(${booking.id}, event); this.closest('.toast-notification').remove()" class="text-[10px] font-bold text-slate-500 uppercase hover:underline">Snooze (5m)</button>
                    </div>
                </div>
            `;
            container.appendChild(toast);
            setTimeout(() => { if(toast.parentElement) toast.remove(); }, 8000);
        }

        // Demo trigger every 7 seconds to simulate "due" bookings
        setInterval(() => {
            const demoNotif = { 
                id: Date.now(), 
                name: "Auto-Generated Booking " + Math.floor(Math.random()*100), 
                time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), 
                read: false, 
                type: 'System' 
            };
            notifications.unshift(demoNotif);
            renderNotifications();
            showPopUp(demoNotif);
        }, 7000);

        // Initial Load
        renderNotifications();
    </script>
</body>
</html>
