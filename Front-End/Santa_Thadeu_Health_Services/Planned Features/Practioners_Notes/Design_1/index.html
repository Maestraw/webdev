<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedTrack Pro | Patient History System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .loading-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen overflow-hidden flex flex-col">

    <!-- Top Navigation -->
    <header class="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center shrink-0 z-10">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-1.5 rounded-lg">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                </svg>
            </div>
            
        </div>
        <div class="flex items-center gap-4">
            <div id="connectionStatus" class="flex items-center gap-2 text-xs font-medium text-green-600 bg-green-50 px-2 py-1 rounded-full">
                <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                API Connected
            </div>
            <button class="text-slate-500 hover:text-slate-800 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- Sidebar: Patient List -->
        <aside class="w-80 border-r border-slate-200 bg-white flex flex-col shrink-0">
            <div class="p-4 border-b border-slate-100">
                <div class="relative">
                    <input type="text" id="patientSearch" placeholder="Search patients..." class="w-full pl-9 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all">
                    <svg class="w-4 h-4 text-slate-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>
            </div>
            <div id="patientList" class="flex-1 overflow-y-auto custom-scrollbar">
                <!-- Skeleton Loader -->
                <div id="sidebarSkeleton" class="p-4 space-y-4">
                    <div class="h-12 bg-slate-100 rounded-lg loading-pulse"></div>
                    <div class="h-12 bg-slate-100 rounded-lg loading-pulse"></div>
                    <div class="h-12 bg-slate-100 rounded-lg loading-pulse"></div>
                </div>
            </div>
        </aside>

        <!-- Main Content: History & Details -->
        <section class="flex-1 flex flex-col bg-slate-50 overflow-hidden">
            <div id="noSelectionState" class="flex-1 flex flex-col items-center justify-center text-slate-400">
                <svg class="w-16 h-16 mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                <p class="text-lg font-medium">Select a patient to view clinical history</p>
            </div>

            <div id="activePatientState" class="hidden flex-1 flex flex-col overflow-hidden">
                <!-- Patient Profile Header -->
                <div class="bg-white border-b border-slate-200 p-6 flex justify-between items-start shrink-0">
                    <div class="flex gap-4">
                        <div id="patientAvatar" class="w-16 h-16 rounded-2xl bg-blue-100 text-blue-700 flex items-center justify-center text-2xl font-bold uppercase">
                            JS
                        </div>
                        <div>
                            <h2 id="activePatientName" class="text-2xl font-bold text-slate-800">John Smith</h2>
                            <div class="flex gap-3 mt-1 text-sm text-slate-500">
                                <span id="activePatientMeta">ID: #4492 • Male • 34 yrs</span>
                                <span class="text-slate-300">|</span>
                                <span class="flex items-center gap-1"><span class="w-2 h-2 bg-blue-500 rounded-full"></span> Active</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="openRecordModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold shadow-sm transition-all flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
                            New Encounter
                        </button>
                    </div>
                </div>

                <!-- History Timeline -->
                <div class="flex-1 overflow-y-auto p-6 custom-scrollbar">
                    <div class="max-w-4xl mx-auto">
                        <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-6">Clinical Timeline</h3>
                        <div id="historyTimeline" class="space-y-6 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px before:h-full before:w-0.5 before:bg-gradient-to-b before:from-slate-200 before:via-slate-200 before:to-transparent">
                            <!-- Timeline items injected here -->
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal: New Record -->
    <div id="recordModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden transform transition-all">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-xl font-bold text-slate-800">Add Clinical Encounter</h3>
                <button onclick="closeRecordModal()" class="text-slate-400 hover:text-slate-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <form id="encounterForm" class="p-6 space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Encounter Type</label>
                    <select id="recordType" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500/20 outline-none">
                        <option value="Consultation">General Consultation</option>
                        <option value="Emergency">Emergency Visit</option>
                        <option value="Follow-up">Follow-up</option>
                        <option value="Diagnostic">Diagnostic/Lab Results</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Clinical Notes & Findings</label>
                    <textarea id="recordNotes" rows="4" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500/20 outline-none placeholder:text-slate-300" placeholder="Describe symptoms, diagnosis, and treatment plan..."></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Status</label>
                        <select id="recordStatus" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500/20 outline-none">
                            <option value="Stable">Stable</option>
                            <option value="Critical">Critical</option>
                            <option value="Improving">Improving</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Practitioner</label>
                        <input type="text" id="recordDoc" value="Dr. Sarah Jenkins" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm bg-slate-50 text-slate-500" readonly>
                    </div>
                </div>
                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="closeRecordModal()" class="flex-1 px-4 py-2 border border-slate-200 text-slate-600 rounded-lg text-sm font-semibold hover:bg-slate-50 transition-colors">Cancel</button>
                    <button type="submit" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-semibold hover:bg-blue-700 shadow-md transition-colors">Save Encounter</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        /**
         * MOCK API SERVICE
         */
        const PatientAPI = {
            latency: 600,
            
            async getPatients() {
                await new Promise(r => setTimeout(r, this.latency));
                return [
                    { id: '101', name: 'James Wilson', dob: '1982-05-12', gender: 'Male', status: 'Active' },
                    { id: '102', name: 'Elena Rodriguez', dob: '1995-11-20', gender: 'Female', status: 'Stable' },
                    { id: '103', name: 'Marcus Chen', dob: '1970-03-05', gender: 'Male', status: 'Urgent' },
                    { id: '104', name: 'Sarah O\'Connor', dob: '1991-08-30', gender: 'Female', status: 'Active' }
                ];
            },

            async getHistory(patientId) {
                await new Promise(r => setTimeout(r, this.latency));
                const mockHistory = {
                    '101': [
                        { id: 'h1', date: '2023-10-15', type: 'Consultation', notes: 'Patient reports recurring migraines. Prescribed Magnesium supplements and advised on sleep hygiene.', status: 'Stable', doc: 'Dr. Jenkins' },
                        { id: 'h2', date: '2023-09-02', type: 'Diagnostic', notes: 'Blood work results within normal range. Slightly low Vitamin D levels.', status: 'Improving', doc: 'Dr. Jenkins' }
                    ],
                    '102': [
                        { id: 'h3', date: '2023-11-01', type: 'Emergency', notes: 'Acute appendicitis symptoms. Scheduled for immediate ultrasound.', status: 'Critical', doc: 'Dr. Miller' }
                    ]
                };
                return mockHistory[patientId] || [];
            }
        };

        /**
         * APPLICATION STATE
         */
        const State = {
            patients: [],
            selectedPatient: null,
            history: [],

            async init() {
                try {
                    this.patients = await PatientAPI.getPatients();
                    
                    // Defend against null DOM references if init is called before mount
                    const skeleton = document.getElementById('sidebarSkeleton');
                    if (skeleton) skeleton.classList.add('hidden');
                    
                    UI.renderPatientList(this.patients);
                } catch (error) {
                    console.error("Initialization failed:", error);
                }
            },

            async selectPatient(id) {
                this.selectedPatient = this.patients.find(p => p.id === id);
                this.history = await PatientAPI.getHistory(id);
                UI.renderActivePatient();
            },

            addEncounter(data) {
                const newEncounter = {
                    id: Date.now().toString(),
                    date: new Date().toISOString().split('T')[0],
                    ...data
                };
                this.history.unshift(newEncounter);
                UI.renderHistory();
            }
        };

        /**
         * UI COMPONENTS & RENDERING
         */
        const UI = {
            renderPatientList(list) {
                const container = document.getElementById('patientList');
                if (!container) return;

                // Create inner content string
                const html = list.map(p => `
                    <div onclick="State.selectPatient('${p.id}')" class="p-4 border-b border-slate-50 hover:bg-blue-50 cursor-pointer transition-colors group">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-500 group-hover:bg-blue-100 group-hover:text-blue-600 transition-colors">
                                ${p.name.split(' ').map(n => n[0]).join('')}
                            </div>
                            <div class="flex-1 overflow-hidden">
                                <div class="font-semibold text-sm truncate">${p.name}</div>
                                <div class="text-xs text-slate-400">ID: #${p.id}</div>
                            </div>
                            <div class="w-2 h-2 rounded-full ${p.status === 'Urgent' ? 'bg-red-500' : 'bg-green-500'}"></div>
                        </div>
                    </div>
                `).join('');
                
                // If skeleton exists in the list container, remove it or append after
                container.innerHTML = html;
            },

            renderActivePatient() {
                const p = State.selectedPatient;
                const noSel = document.getElementById('noSelectionState');
                const activeSel = document.getElementById('activePatientState');
                
                if (noSel) noSel.classList.add('hidden');
                if (activeSel) activeSel.classList.remove('hidden');
                
                document.getElementById('activePatientName').textContent = p.name;
                document.getElementById('activePatientMeta').textContent = `ID: #${p.id} • ${p.gender} • ${this.calculateAge(p.dob)} yrs`;
                document.getElementById('patientAvatar').textContent = p.name.split(' ').map(n => n[0]).join('');
                
                this.renderHistory();
            },

            renderHistory() {
                const container = document.getElementById('historyTimeline');
                if (!container) return;

                if (State.history.length === 0) {
                    container.innerHTML = '<div class="text-center py-10 text-slate-400 italic">No historical records found for this patient.</div>';
                    return;
                }

                container.innerHTML = State.history.map(item => `
                    <div class="relative pl-12 transition-all">
                        <div class="absolute left-0 top-1 w-10 h-10 rounded-full border-4 border-slate-50 bg-white flex items-center justify-center z-10">
                            ${this.getIconForType(item.type)}
                        </div>
                        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm hover:border-blue-200 transition-colors">
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <span class="text-xs font-bold text-blue-600 uppercase tracking-tighter">${item.type}</span>
                                    <h4 class="text-sm font-semibold text-slate-500">${item.date}</h4>
                                </div>
                                <span class="px-2 py-1 rounded text-[10px] font-bold uppercase ${this.getStatusClass(item.status)}">
                                    ${item.status}
                                </span>
                            </div>
                            <p class="text-sm text-slate-700 leading-relaxed mb-4">${item.notes}</p>
                            <div class="flex items-center gap-2 text-xs text-slate-400 border-t border-slate-50 pt-3">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                                Verified by ${item.doc}
                            </div>
                        </div>
                    </div>
                `).join('');
            },

            getIconForType(type) {
                const icons = {
                    'Consultation': '<svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>',
                    'Emergency': '<svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>',
                    'Diagnostic': '<svg class="w-5 h-5 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>',
                    'Follow-up': '<svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>'
                };
                return icons[type] || icons['Consultation'];
            },

            getStatusClass(status) {
                const classes = {
                    'Stable': 'bg-green-100 text-green-700',
                    'Improving': 'bg-blue-100 text-blue-700',
                    'Critical': 'bg-red-100 text-red-700'
                };
                return classes[status] || 'bg-slate-100 text-slate-700';
            },

            calculateAge(dob) {
                const birthDate = new Date(dob);
                const difference = Date.now() - birthDate.getTime();
                const ageDate = new Date(difference);
                return Math.abs(ageDate.getUTCFullYear() - 1970);
            }
        };

        /**
         * INTERACTION HANDLERS
         */
        function openRecordModal() {
            const modal = document.getElementById('recordModal');
            if (modal) modal.classList.remove('hidden');
        }

        function closeRecordModal() {
            const modal = document.getElementById('recordModal');
            if (modal) modal.classList.add('hidden');
        }

        // Event delegation and initialization
        window.addEventListener('DOMContentLoaded', () => {
            // Start data loading
            State.init();

            // Set up form listeners
            const form = document.getElementById('encounterForm');
            if (form) {
                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const data = {
                        type: document.getElementById('recordType').value,
                        notes: document.getElementById('recordNotes').value,
                        status: document.getElementById('recordStatus').value,
                        doc: document.getElementById('recordDoc').value
                    };
                    
                    if(!data.notes.trim()) return;

                    State.addEncounter(data);
                    e.target.reset();
                    closeRecordModal();
                });
            }

            // Set up search listener
            const searchInput = document.getElementById('patientSearch');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    const query = e.target.value.toLowerCase();
                    const filtered = State.patients.filter(p => p.name.toLowerCase().includes(query));
                    UI.renderPatientList(filtered);
                });
            }
        });
    </script>
</body>
</html>
